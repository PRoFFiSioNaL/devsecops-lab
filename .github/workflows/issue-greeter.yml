name: Issue Greeter
on:
  issues:
    types: [opened]

jobs:
  greet:
    runs-on: ubuntu-latest
    env:
      FLAG: "USER{1ssu3_1nj3ct10n_m4st3r}"
    steps:
      - name: Greet the new issue
        run: |
          echo "Привет! Спасибо за создание Issue с названием: ${{ github.event.issue.title }}. Наша команда уже работает над этим!"
